name: Docker Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  merge_group:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: docker build --target builder -t zenao-backend-test .
