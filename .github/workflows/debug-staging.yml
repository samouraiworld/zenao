name: Debug Staging
on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Environment
        uses: appleboy/ssh-action@v1
        with:
          host: 51.159.98.163
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd zenao
            echo "--- backend.env content (masked) ---"
            grep ZENAO backend.env | sed 's/=.*/=******/'
            echo "--- docker ps ---"
            docker ps
            echo "--- backend environment ---"
            CONTAINER_ID=$(docker ps -q -f name=backend | head -n 1)
            if [ -n "$CONTAINER_ID" ]; then
              docker exec "$CONTAINER_ID" env | grep ZENAO
            else
              echo "Could not find backend container"
            fi
