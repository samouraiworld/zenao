name: Configure Staging Stripe

on:
  workflow_dispatch:

jobs:
  configure-stripe:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Stripe env vars + add admin SSH key
        uses: appleboy/ssh-action@v1
        with:
          host: 51.159.98.163
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -xe

            # Add admin SSH key for future direct access
            mkdir -p ~/.ssh
            echo 'ssh-rsa  tajsurf@gmail.com' >> ~/.ssh/authorized_keys
            sort -u -o ~/.ssh/authorized_keys ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys

            # Add Stripe + app config to backend.env (idempotent)
            cd zenao
            grep -q 'ZENAO_STRIPE_SECRET_KEY' backend.env 2>/dev/null && \
              sed -i 's|^ZENAO_STRIPE_SECRET_KEY=.*|ZENAO_STRIPE_SECRET_KEY=${{ secrets.STRIPE_TEST_SECRET_KEY }}|' backend.env || \
              echo 'ZENAO_STRIPE_SECRET_KEY=${{ secrets.STRIPE_TEST_SECRET_KEY }}' >> backend.env

            grep -q 'ZENAO_PAID_EVENTS_ENABLED' backend.env 2>/dev/null && \
              sed -i 's|^ZENAO_PAID_EVENTS_ENABLED=.*|ZENAO_PAID_EVENTS_ENABLED=true|' backend.env || \
              echo 'ZENAO_PAID_EVENTS_ENABLED=true' >> backend.env

            grep -q 'ZENAO_APP_BASE_URL' backend.env 2>/dev/null && \
              sed -i 's|^ZENAO_APP_BASE_URL=.*|ZENAO_APP_BASE_URL=https://zenao.io|' backend.env || \
              echo 'ZENAO_APP_BASE_URL=https://zenao.io' >> backend.env

            # Force recreate backend container to pick up new env
            docker compose -f staging.docker-compose.yml down backend
            docker compose -f staging.docker-compose.yml up -d --build backend

            echo "✅ Stripe configured and backend restarted"
